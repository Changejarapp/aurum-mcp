name: Sync manifest

# Pulls the latest manifest from the live aurum-android gallery into
# `data/manifest.json` and opens an auto-merging PR if it changed.
#
# Triggers:
#   - `repository_dispatch: aurum-content-changed` (Stage 2 — fired by
#     aurum-android when its main branch updates).
#   - Daily cron at 06:00 UTC as a safety net.
#   - Manual `workflow_dispatch` for ad-hoc syncs.

on:
  repository_dispatch:
    types: [aurum-content-changed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-manifest
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Fetch manifest
        run: pnpm manifest:fetch

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet -- data/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read aurum version from new manifest
        if: steps.diff.outputs.changed == 'true'
        id: meta
        run: |
          AURUM_VERSION=$(jq -r '.aurum.version' data/manifest.json)
          MANIFEST_SHA=$(jq -r '.meta.manifestSha' data/manifest.json)
          echo "aurum_version=$AURUM_VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest_sha=${MANIFEST_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json to match aurum version
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Mirror the upstream Aurum library version 1:1 so users always
          # know which Aurum release they have installed.
          npm version "${{ steps.meta.outputs.aurum_version }}" --no-git-tag-version --allow-same-version

      - name: Open auto-merging PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/manifest-sync
          delete-branch: true
          base: main
          title: "chore: sync manifest to aurum@${{ steps.meta.outputs.aurum_version }}"
          commit-message: "Sync manifest to aurum@${{ steps.meta.outputs.aurum_version }} (${{ steps.meta.outputs.manifest_sha }})"
          body: |
            Auto-generated by `sync-manifest.yml`.

            - Aurum version: **${{ steps.meta.outputs.aurum_version }}**
            - Manifest SHA: `${{ steps.meta.outputs.manifest_sha }}`
            - Source: <https://changejarapp.github.io/aurum-android/data/manifest.json>

            Once this PR merges, dispatch `release.yml` to tag the new version.
          labels: auto-merge, manifest-sync

      - name: No-op summary
        if: steps.diff.outputs.changed == 'false'
        run: echo "Manifest is already up-to-date."
