name: Sync manifest

# Pulls the latest manifests from BOTH live galleries (aurum-android +
# aurum-ios), merges them into one multi-platform manifest
# (`scripts/fetch-manifest.mjs`), and commits `data/manifest.json` if it
# changed.
#
# Triggers:
#   - `repository_dispatch: aurum-content-changed` (Stage 2 — fired by
#     aurum-android when its main branch updates; aurum-ios has no notify
#     hook, so iOS releases land via the daily cron within 24h).
#   - Daily cron at 06:00 UTC as a safety net.
#   - Manual `workflow_dispatch` for ad-hoc syncs.

on:
  repository_dispatch:
    types: [aurum-content-changed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-manifest
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Fetch manifest
        run: pnpm manifest:fetch

      - name: Detect change
        id: diff
        run: |
          if git diff --quiet -- data/manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read aurum versions from new manifest
        if: steps.diff.outputs.changed == 'true'
        id: meta
        run: |
          ANDROID_VERSION=$(jq -r '.aurum.sources.android.version // .aurum.version' data/manifest.json)
          IOS_VERSION=$(jq -r '.aurum.sources.ios.version // empty' data/manifest.json)
          MANIFEST_SHA=$(jq -r '.meta.manifestSha' data/manifest.json)
          LABEL="android@${ANDROID_VERSION}"
          if [ -n "$IOS_VERSION" ]; then LABEL="${LABEL} + ios@${IOS_VERSION}"; fi
          echo "aurum_version=$LABEL" >> "$GITHUB_OUTPUT"
          echo "manifest_sha=${MANIFEST_SHA:0:8}" >> "$GITHUB_OUTPUT"

      # The manifest is generated, derived data — there is nothing to
      # review, so commit it straight to main (frictionless; no PR). The
      # push triggers build.yml; cut a release (release.yml) to redeploy
      # the bundled manifest into the served MCP. The SCHEDULED drift-check
      # is the independent alarm if this push ever fails.
      #
      # We deliberately do NOT bump package.json to the Aurum library
      # version — aurum-mcp keeps its OWN SemVer because it aggregates
      # multiple source platforms (aurum-android today, aurum-ios later),
      # each on its own release cadence. The per-tool footer already
      # prints the source version(s). release.yml's manual `npm version`
      # remains the single source of MCP version changes.
      - name: Commit manifest to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "aurum-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: sync manifest — ${{ steps.meta.outputs.aurum_version }} (${{ steps.meta.outputs.manifest_sha }})"
          git push origin HEAD:main

      - name: No-op summary
        if: steps.diff.outputs.changed == 'false'
        run: echo "Manifest is already up-to-date."
