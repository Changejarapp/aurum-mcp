name: Drift check

# Fails any PR whose `data/manifest.json` is out of sync with the MERGE of
# the two live gallery manifests (aurum-android + aurum-ios). Forces the
# sync-manifest push to land first before unrelated changes can ship.
#
# The bundled manifest is a MERGED artifact now — the only way to know what
# it should contain is to re-run the same merge (`pnpm manifest:fetch`)
# against the live galleries and compare, with volatile provenance fields
# scrubbed.
#
# Soft-fails (warns but passes) when either live manifest URL is
# unreachable — with nothing to compare against, better to let the PR
# through on the committed manifest than to block every PR on an upstream
# pipeline gap. The SCHEDULED run stays the independent alarm.

on:
  pull_request:
  # Run on a schedule too — NOT just PRs. A PR-only gate can't see drift
  # when no PR is open, which is exactly how the manifest silently fell a
  # month behind the gallery. The daily run (1h after sync-manifest's
  # 06:00 fetch) is the independent alarm; it files an issue on real drift.
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Rebuild merged manifest from the live galleries
        id: fetch
        run: |
          set +e
          pnpm manifest:fetch
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Live gallery manifest(s) not reachable (manifest:fetch exit $rc). Skipping drift comparison — see drift-check.yml header."
            git checkout -- data/manifest.json
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Compare
        if: steps.fetch.outputs.skipped != 'true'
        run: |
          # Content-aware comparison.
          #
          # We scrub the fields that change on EVERY upstream gallery deploy
          # without affecting MCP behaviour:
          #
          #   aurum.sha              ─ primary source's commit SHA at deploy time
          #   aurum.sources[].sha    ─ per-platform source SHAs (same churn)
          #   meta.generatedAt       ─ derived from upstream deploy timestamps
          #   meta.manifestSha       ─ SHA-256 over content, rolls up the above
          #
          # Real content drift in any of:
          #   schemaVersion, aurum.{library,version,platforms,sources[].version},
          #   meta.{figmaFileKey,galleryUrl},
          #   components, tokens, icons, codeConnect, changelog(s)
          # still fails the diff and blocks the PR — exactly what we want.
          SCRUB='del(.aurum.sha, .aurum.sources[]?.sha, .meta.generatedAt, .meta.manifestSha)'
          git show HEAD:data/manifest.json | jq --sort-keys "$SCRUB" > /tmp/local-canon.json
          jq --sort-keys "$SCRUB" data/manifest.json > /tmp/live-canon.json
          if ! diff -q /tmp/local-canon.json /tmp/live-canon.json > /dev/null; then
            echo "::error::Bundled manifest is out of sync with the merged live galleries (real content drift, not just provenance)."
            echo "Run \`pnpm manifest:fetch\` and commit (or wait for sync-manifest.yml) before merging."
            diff -u /tmp/local-canon.json /tmp/live-canon.json | head -60 || true
            exit 1
          fi
          echo "✓ Bundled manifest matches the merged live galleries (provenance fields scrubbed)."

      # On a SCHEDULED run, a drift failure means the sync push didn't land —
      # make it loud (a red cron nobody watches is how this rotted for a
      # month). File/append a tracking issue so it reaches a human.
      - name: Alarm on scheduled drift
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ MCP manifest drifted from the live aurum galleries"
          BODY=$'The bundled `data/manifest.json` no longer matches the merge of the live aurum-android + aurum-ios gallery manifests (scheduled drift-check failed) — the sync-manifest push likely failed.\n\nFix: re-run **Sync manifest** (or `pnpm manifest:fetch` + push), then cut a **release** to redeploy the bundled manifest into the served MCP.\n\n_auto-filed by drift-check.yml_'
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label manifest-sync 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
