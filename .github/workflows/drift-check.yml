name: Drift check

# Fails any PR whose `data/manifest.json` is out of sync with the live
# gallery URL. Forces the auto-merging sync-manifest PR to land first
# before unrelated changes can ship.
#
# Soft-fails (warns but passes) when the live manifest URL is 404 — the
# upstream `aurum-android` Pages site doesn't always publish data/
# alongside the HTML gallery. When that's the case we have nothing to
# compare against; better to let the PR through and rely on the
# committed manifest than to block every PR on an upstream pipeline gap.

on:
  pull_request:
  # Run on a schedule too — NOT just PRs. A PR-only gate can't see drift
  # when no PR is open, which is exactly how the manifest silently fell a
  # month behind the gallery. The daily run (1h after sync-manifest's
  # 06:00 fetch) is the independent alarm; it files an issue on real drift.
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Fetch live manifest
        id: fetch
        run: |
          set +e
          curl -fsS https://changejarapp.github.io/aurum-android/data/manifest.json \
            -o /tmp/live-manifest.json
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Live gallery manifest not reachable (curl exit $rc). Skipping drift comparison — see drift-check.yml header."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Compare
        if: steps.fetch.outputs.skipped != 'true'
        run: |
          # Content-aware comparison.
          #
          # We scrub three fields that change on EVERY upstream gallery
          # deploy without affecting MCP behaviour:
          #
          #   aurum.sha          ─ git commit SHA at gallery-deploy time
          #   meta.generatedAt   ─ ISO timestamp from generate.py
          #   meta.manifestSha   ─ SHA-256 over the manifest content,
          #                        rolls up the two above
          #
          # Without this scrub, drift-check fails on every aurum-mcp PR
          # opened after any aurum-android push to main — even when the
          # actual content (components, tokens, icons, codeConnect,
          # changelog, schema) is byte-identical. The scrub turns this
          # gate into a "real content drift" check rather than a
          # "did upstream redeploy" tripwire.
          #
          # Real content drift in any of:
          #   schemaVersion, aurum.{library,version,platforms},
          #   meta.{figmaFileKey,galleryUrl},
          #   components, tokens, icons, codeConnect, changelog
          # still fails the diff and blocks the PR — exactly what we want.
          #
          # If the manifest schema later adds a new volatile metadata
          # field, extend the SCRUB filter below to drop it. `jq del()`
          # is a no-op on missing keys, so the filter is forward-safe
          # against older bundled manifests that pre-date a field.
          SCRUB='del(.aurum.sha, .meta.generatedAt, .meta.manifestSha)'
          jq --sort-keys "$SCRUB" data/manifest.json     > /tmp/local-canon.json
          jq --sort-keys "$SCRUB" /tmp/live-manifest.json > /tmp/live-canon.json
          if ! diff -q /tmp/local-canon.json /tmp/live-canon.json > /dev/null; then
            echo "::error::Bundled manifest is out of sync with the live gallery (real content drift, not just provenance)."
            echo "Run \`make manifest-fetch\` (or wait for the auto-PR from sync-manifest.yml) before merging."
            diff -u /tmp/local-canon.json /tmp/live-canon.json | head -60 || true
            exit 1
          fi
          echo "✓ Bundled manifest matches live gallery (provenance fields scrubbed)."

      # On a SCHEDULED run, a drift failure means the sync push didn't land —
      # make it loud (a red cron nobody watches is how this rotted for a
      # month). File/append a tracking issue so it reaches a human.
      - name: Alarm on scheduled drift
        if: ${{ failure() && github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="⚠️ MCP manifest drifted from the live aurum gallery"
          BODY=$'The bundled `data/manifest.json` no longer matches the live gallery manifest (scheduled drift-check failed) — the sync-manifest push likely failed.\n\nFix: re-run **Sync manifest** (or `pnpm manifest:fetch` + push), then cut a **release** to redeploy the bundled manifest into the served MCP.\n\n_auto-filed by drift-check.yml_'
          NUM=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label manifest-sync 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
