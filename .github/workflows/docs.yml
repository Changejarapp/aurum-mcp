name: Deploy docs

# Renders docs/ to GitHub Pages. The Pages site lives at
# https://changejarapp.github.io/aurum-mcp/ in Stage 1, then
# https://changejarapp.github.io/aurum-mcp/ after the org migration.

on:
  push:
    branches: [main]
    paths: ['docs/**', 'README.md', '.github/workflows/docs.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Stage source for Jekyll
        # Pages with `Source: GitHub Actions` doesn't run Jekyll for us —
        # the upload-pages-artifact action just serves whatever we put in
        # the upload directory verbatim. We have to build markdown → HTML
        # ourselves via actions/jekyll-build-pages.
        run: |
          mkdir -p src
          cp README.md src/index.md
          cp -r docs src/
          cat > src/_config.yml <<'EOF'
          theme: jekyll-theme-cayman
          title: aurum-mcp
          description: MCP server for the Aurum Design System
          show_downloads: false
          EOF

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./src
          destination: ./_site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
